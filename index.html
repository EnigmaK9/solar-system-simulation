<!DOCTYPE html>
<!--
  Solar System — WebGL Simulation

  A real-time 3D solar system built with Three.js and WebGL 2.0.
  Modular ES module architecture: the HTML file is a thin shell;
  all logic lives in src/.

  @created   2026-06-16
  @modified  2026-06-16
  @author    enigmak9
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System — WebGL Simulation</title>

  <!--
    CSS overlay layer: all UI sits above the WebGL <canvas>.
    The canvas fills the viewport; HUD elements use absolute positioning.
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas { display: block; }

    /* ── HUD: title + subtitle, top-left ─────────────────────────────── */
    #hud {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #fff;
      pointer-events: none;  /* clicks pass through to canvas */
      z-index: 10;
    }
    #hud h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    #hud .subtitle {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* ── Bottom control bar ──────────────────────────────────────────── */
    #controls {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    #controls button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.85);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      backdrop-filter: blur(6px);
      transition: background 0.25s, border-color 0.25s;
    }
    #controls button:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.35);
    }
    #controls button.active {
      background: rgba(100,160,255,0.28);
      border-color: rgba(130,180,255,0.55);
    }

    /* ── Planet name tooltip ─────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      color: #fff;
      font-size: 0.78rem;
      padding: 5px 10px;
      background: rgba(0,0,0,0.7);
      border-radius: 6px;
      display: none;
      z-index: 20;
      white-space: nowrap;
    }

    /* ── Speed readout ───────────────────────────────────────────────── */
    #speed-readout {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      z-index: 10;
    }

    /* ── Keyboard shortcut hints ──────────────────────────────────────── */
    #shortcuts-hint {
      position: absolute;
      bottom: 118px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.6rem;
      letter-spacing: 0.03em;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- DOM overlay — sits above the WebGL canvas -->
  <div id="hud">
    <h1>Solar System</h1>
    <div class="subtitle">Drag to orbit &bull; Scroll to zoom &bull; Click a planet to focus &bull; Space to pause</div>
  </div>

  <div id="tooltip"></div>
  <div id="shortcuts-hint">Space pause &bull; R reset &bull; +/− speed &bull; T top &bull; O orbit</div>
  <div id="speed-readout">Speed &times;1.0</div>

  <div id="controls">
    <button id="btn-pause">⏸&nbsp;Pause</button>
    <button id="btn-slower">&#8722;&nbsp;Slower</button>
    <button id="btn-reset" class="active">1&times;</button>
    <button id="btn-faster">Faster&nbsp;+</button>
    <button id="btn-topdown">Top View</button>
    <button id="btn-orbit-cam">Orbit Cam</button>
  </div>

  <!--
    Import map: tells the browser where to resolve "three" and "three/addons/"
    bare specifiers. Our own modules use relative paths (./src/...).
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!--
    Single entry point: src/main.js orchestrates all modules.
    type="module" enables ES imports and strict mode.
  -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
